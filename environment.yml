name: cmager
channels:
  - conda-forge
  - bioconda
  - defaults
  
dependencies:
  # Core Python runtime & testing
  - python=3.13
  - pip
  - pytest
  - numpy
  - pandas
  - scanpy
  - anndata<0.13
  - click

  # R Runtime & basic packages
  - r-base=4.4
  - r-readr
  - r-foreach
  - r-mda
  # - r-gamsel ### install gamsel on first run due to missing package in repos
  - r-Matrix
  - r-matrixStats
  - r-anndata
  
  # Pip-specific installs
  - pip:
      - celltypist
